# ==================================================
# RAG Q&A System - CI/CD Pipeline
# ==================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================
  # Lint and Format Check
  # ============================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-lint-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-lint-

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Ruff linter
        run: uv run ruff check app/ tests/ --output-format=github

      - name: Check code formatting with Black
        run: uv run black --check app/ tests/

  # ============================================
  # Unit Tests
  # ============================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-test-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-test-

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        env:
          GROQ_API_KEY: "test-key"
          COHERE_API_KEY: "test-key"
          QDRANT_URL: "http://localhost:6333"
          QDRANT_API_KEY: "test-key"
        run: |
          uv run pytest --cov=app --cov-report=xml --cov-report=html --cov-fail-under=35

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  # ============================================
  # Build Docker Image
  # ============================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: simple-rag-system:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm \
            -e GROQ_API_KEY=test-key \
            -e COHERE_API_KEY=test-key \
            -e QDRANT_URL=http://localhost:6333 \
            -e QDRANT_API_KEY=test-key \
            simple-rag-system:${{ github.sha }} python -c "from app.main import app; print('App loaded successfully')"

  # ============================================
  # Security Scan (Optional)
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install project dependencies
        run: uv sync --all-extras --dev

      - name: Install security tools
        run: uv add --dev bandit safety --no-sync

      - name: Run Bandit security scan
        run: uv run bandit -r app/ -ll --skip B101
        continue-on-error: true

      - name: Export dependencies for scanning
        run: uv export --no-dev --format requirements-txt > requirements-scan.txt

      - name: Check dependencies for vulnerabilities
        run: uv run safety check -r requirements-scan.txt
        continue-on-error: true
  # ============================================
  # Push to ECR (only on main branch)
  # ============================================
  push-to-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/simple-rag-system:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/simple-rag-system:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max